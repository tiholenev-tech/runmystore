<!doctype html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08090d">
<title>Финанси — RunMyStore.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-main);color:var(--text-primary);font-family:'Montserrat',Inter,system-ui,sans-serif;min-height:100dvh}
.page-wrap{max-width:480px;margin:0 auto;padding:0 12px}
.page-header{position:sticky;top:0;z-index:50;background:rgba(3,7,18,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-subtle);padding:max(12px,calc(env(safe-area-inset-top,0px) + 12px)) 16px 12px;margin:0 -12px;display:flex;align-items:center;gap:8px}
:root[data-theme="light"] .page-header{background:rgba(244,246,251,.92);border-bottom-color:var(--border-subtle)}
.page-header h1{flex:1;font-size:18px;font-weight:800;background:linear-gradient(135deg,#f1f5f9,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
:root[data-theme="light"] .page-header h1{background:linear-gradient(135deg,#1e1b4b,#4338ca);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-btn{width:32px;height:32px;border-radius:10px;background:rgba(99,102,241,.15);border:none;color:var(--indigo-300);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.back-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ph-theme-toggle{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s,background .2s;flex-shrink:0}
.ph-theme-toggle:hover{color:var(--indigo-300);border-color:var(--border-glow)}
.ph-theme-toggle svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:14px;padding:16px;margin:12px 0;box-shadow:var(--shadow-card)}
.card-title{font-size:11px;font-weight:700;color:var(--text-secondary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.placeholder{padding:32px 12px;text-align:center;color:var(--text-muted);font-size:13px;line-height:1.5}
.placeholder svg{width:42px;height:42px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.55;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kpi{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:12px;padding:12px}
.kpi-label{font-size:10px;font-weight:700;color:var(--text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-size:18px;font-weight:800;color:var(--text-primary)}
.kpi-value.muted{color:var(--text-muted)}
</style>
</head>
<body>

<div class="page-wrap">
    <div class="page-header">
        <a href="warehouse.php" class="back-btn" aria-label="Назад"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
        <h1>Финанси</h1>
        <button class="ph-theme-toggle" id="themeToggle" type="button" aria-label="Светла/тъмна тема" onclick="toggleTheme()">
            <svg id="themeIconSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg id="themeIconMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="card">
        <div class="card-title">Преглед</div>
        <div class="kpi-grid">
            <div class="kpi"><div class="kpi-label">Приход (днес)</div><div class="kpi-value muted">— €</div></div>
            <div class="kpi"><div class="kpi-label">Печалба (днес)</div><div class="kpi-value muted">— €</div></div>
            <div class="kpi"><div class="kpi-label">Себестойност</div><div class="kpi-value muted">— €</div></div>
            <div class="kpi"><div class="kpi-label">Марж</div><div class="kpi-value muted">— %</div></div>
        </div>
        <div class="placeholder" style="padding:18px 12px">
            <div>Финансовите справки идват от <a href="stats.php" style="color:var(--indigo-300);text-decoration:none">stats.php</a>. Този екран е заглавен placeholder за S82+.</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Разходи</div>
        <div class="placeholder">
            <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <div>Регистър на оперативни разходи — скоро.</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Доставчици</div>
        <div class="placeholder">
            <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8Z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            <div>Дължими към доставчици — следва интеграция със suppliers.php.</div>
        </div>
    </div>
</div>

<script>
(function initTheme(){
    try{
        var saved=localStorage.getItem('rms_theme');
        if(saved==='light'){document.documentElement.setAttribute('data-theme','light')}
        document.addEventListener('DOMContentLoaded',function(){
            var sun=document.getElementById('themeIconSun');
            var moon=document.getElementById('themeIconMoon');
            if(!sun||!moon)return;
            var isLight=document.documentElement.getAttribute('data-theme')==='light';
            if(isLight){sun.style.display='';moon.style.display='none'}
            else{sun.style.display='none';moon.style.display=''}
        });
    }catch(_){}
})();
function toggleTheme(){
    var cur=document.documentElement.getAttribute('data-theme')||'dark';
    var nxt=(cur==='light')?'dark':'light';
    if(nxt==='light'){document.documentElement.setAttribute('data-theme','light')}
    else{document.documentElement.removeAttribute('data-theme')}
    try{localStorage.setItem('rms_theme',nxt)}catch(_){}
    var sun=document.getElementById('themeIconSun');
    var moon=document.getElementById('themeIconMoon');
    if(sun&&moon){
        if(nxt==='light'){sun.style.display='';moon.style.display='none'}
        else{sun.style.display='none';moon.style.display=''}
    }
    if(navigator.vibrate)navigator.vibrate(5);
}
</script>
</body>
</html>
