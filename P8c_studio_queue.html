<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08090d">
<title>P8c · AI Studio · Бельо queue · RunMyStore.AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script>(function(){try{var s=localStorage.getItem('rms_theme')||'light';document.documentElement.setAttribute('data-theme',s);}catch(_){document.documentElement.setAttribute('data-theme','light');}})();</script>

<style>
/* P8c — Queue overlay (отваря се от P8 standalone при tap на категория)
   Източник: AI_STUDIO_LOGIC.md §7.413 + §9.578
   Bulk = САМО safe automatic. Индивидуални → tap row → P8b модал. */

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; }
body { font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
button, a { font-family: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { text-decoration: none; }

:root {
  --hue1: 255; --hue2: 222; --hue3: 180;
  --radius: 22px; --radius-sm: 14px; --radius-pill: 999px; --radius-icon: 50%;
  --border: 1px;
  --ease: cubic-bezier(0.5, 1, 0.89, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms; --dur: 250ms; --dur-slow: 350ms;
  --press: 0.97;
  --font: 'Montserrat', sans-serif;
  --font-mono: 'DM Mono', ui-monospace, monospace;
}

:root:not([data-theme]),
:root[data-theme="light"] {
  --bg-main: #e0e5ec; --surface: #e0e5ec; --surface-2: #d1d9e6;
  --border-color: transparent;
  --text: #2d3748; --text-muted: #64748b; --text-faint: #94a3b8;
  --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
  --neu-d: 8px; --neu-b: 16px; --neu-d-s: 4px; --neu-b-s: 8px;
  --shadow-card: var(--neu-d) var(--neu-d) var(--neu-b) var(--shadow-dark), calc(var(--neu-d) * -1) calc(var(--neu-d) * -1) var(--neu-b) var(--shadow-light);
  --shadow-card-sm: var(--neu-d-s) var(--neu-d-s) var(--neu-b-s) var(--shadow-dark), calc(var(--neu-d-s) * -1) calc(var(--neu-d-s) * -1) var(--neu-b-s) var(--shadow-light);
  --shadow-pressed: inset var(--neu-d-s) var(--neu-d-s) var(--neu-b-s) var(--shadow-dark), inset calc(var(--neu-d-s) * -1) calc(var(--neu-d-s) * -1) var(--neu-b-s) var(--shadow-light);
  --accent: oklch(0.62 0.22 285); --accent-2: oklch(0.65 0.25 305); --accent-3: oklch(0.78 0.18 195);
  --magic: oklch(0.65 0.25 310);
  --success: oklch(0.68 0.18 155); --warning: oklch(0.72 0.18 70); --danger: oklch(0.65 0.22 25);
  --aurora-blend: multiply; --aurora-opacity: 0.35;
}
:root[data-theme="dark"] {
  --bg-main: #08090d; --surface: hsl(220, 25%, 4.8%); --surface-2: hsl(220, 25%, 8%);
  --border-color: hsl(var(--hue2), 12%, 20%);
  --text: #f1f5f9; --text-muted: rgba(255,255,255,0.6); --text-faint: rgba(255,255,255,0.4);
  --shadow-card: hsl(var(--hue2) 50% 2%) 0 10px 16px -8px, hsl(var(--hue2) 50% 4%) 0 20px 36px -14px;
  --shadow-card-sm: hsl(var(--hue2) 50% 2%) 0 4px 8px -2px;
  --shadow-pressed: inset 0 2px 4px hsl(var(--hue2) 50% 2%);
  --accent: hsl(var(--hue1), 80%, 65%); --accent-2: hsl(var(--hue2), 80%, 65%); --accent-3: hsl(var(--hue3), 70%, 55%);
  --magic: hsl(280, 70%, 65%);
  --success: hsl(145, 70%, 55%); --warning: hsl(38, 90%, 60%); --danger: hsl(0, 85%, 60%);
  --aurora-blend: plus-lighter; --aurora-opacity: 0.35;
}

:root:not([data-theme]) body, [data-theme="light"] body { background: var(--bg-main); color: var(--text); }
[data-theme="dark"] body {
  background:
    radial-gradient(ellipse 800px 500px at 20% 10%, hsl(280 60% 35% / .22) 0%, transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 85%, hsl(var(--hue2) 60% 35% / .22) 0%, transparent 60%),
    linear-gradient(180deg, #0a0b14 0%, #050609 100%);
  background-attachment: fixed; color: var(--text);
}

.aurora { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.aurora-blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: var(--aurora-opacity); mix-blend-mode: var(--aurora-blend); animation: auroraDrift 20s ease-in-out infinite; }
.aurora-blob:nth-child(1) { width: 280px; height: 280px; background: hsl(280,80%,60%); top: -60px; left: -80px; }
.aurora-blob:nth-child(2) { width: 240px; height: 240px; background: hsl(330,70%,60%); top: 35%; right: -100px; animation-delay: 4s; }
.aurora-blob:nth-child(3) { width: 200px; height: 200px; background: hsl(305,80%,55%); bottom: 80px; left: -50px; animation-delay: 8s; }

/* ═══ HEADER (fullscreen overlay) ═══ */
.qov-header { position: sticky; top: 0; z-index: 50; height: 56px; padding: 0 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-top: env(safe-area-inset-top, 0); }
[data-theme="light"] .qov-header, :root:not([data-theme]) .qov-header { background: var(--bg-main); box-shadow: 0 4px 12px rgba(163,177,198,0.15); }
[data-theme="dark"] .qov-header { background: hsl(220 25% 4.8% / 0.85); backdrop-filter: blur(16px); }

.qov-icon-btn { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; border: 1px solid var(--border-color); }
[data-theme="light"] .qov-icon-btn, :root:not([data-theme]) .qov-icon-btn { background: var(--surface); box-shadow: var(--shadow-card-sm); border: none; }
[data-theme="light"] .qov-icon-btn:active, :root:not([data-theme]) .qov-icon-btn:active { box-shadow: var(--shadow-pressed); }
[data-theme="dark"] .qov-icon-btn { background: hsl(220 25% 8%); }
.qov-icon-btn svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.qov-cat-icon { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; box-shadow: 0 4px 12px hsl(330 70% 50% / 0.4); background: linear-gradient(135deg, hsl(330 70% 55%), hsl(305 65% 55%)); }
.qov-cat-icon svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }
.qov-title-wrap { flex: 1; min-width: 0; }
.qov-title { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15; }
.qov-subtitle { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--text-muted); margin-top: 1px; }

/* ═══ APP ═══ */
.app { position: relative; z-index: 5; max-width: 480px; margin: 0 auto; padding: 12px 12px calc(110px + env(safe-area-inset-bottom, 0)); }

/* ═══ COMPACT CREDITS STRIP ═══ */
.credits-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
.cs-cell { padding: 6px 8px; border-radius: var(--radius-sm); text-align: center; border: 1px solid var(--border-color); }
[data-theme="light"] .cs-cell, :root:not([data-theme]) .cs-cell { background: var(--surface); box-shadow: var(--shadow-pressed); border: none; }
[data-theme="dark"] .cs-cell { background: hsl(220 25% 4%); }
.cs-num { display: block; font-family: var(--font); font-size: 16px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
.cs-of { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--text-muted); }
.cs-lbl { display: block; font-family: var(--font-mono); font-size: 8px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; }
.cs-cell.q-magic .cs-num { background: linear-gradient(135deg, hsl(280 70% 55%), hsl(305 65% 55%)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.cs-cell.q-magic .cs-lbl { color: hsl(280 60% 50%); }
[data-theme="dark"] .cs-cell.q-magic .cs-lbl { color: hsl(280 70% 70%); }
[data-theme="dark"] .cs-cell.q-magic { background: linear-gradient(180deg, hsl(280 50% 10% / 0.5), hsl(220 25% 4%)); border: 1px solid hsl(280 60% 30% / 0.35); }

/* ═══ GLASS BASE ═══ */
.glass { position: relative; border-radius: var(--radius); border: var(--border) solid var(--border-color); isolation: isolate; }
.glass.sm { border-radius: var(--radius-sm); }
.glass .shine, .glass .glow { --hue: var(--hue1); }
.glass .shine-bottom, .glass .glow-bottom { --hue: var(--hue2); --conic: 135deg; }
[data-theme="light"] .glass, :root:not([data-theme]) .glass { background: var(--surface); box-shadow: var(--shadow-card); border: none; }
[data-theme="light"] .glass .shine, [data-theme="light"] .glass .glow,
:root:not([data-theme]) .glass .shine, :root:not([data-theme]) .glass .glow { display: none; }
[data-theme="dark"] .glass { background: linear-gradient(235deg, hsl(var(--hue1) 50% 10% / .8), hsl(var(--hue1) 50% 10% / 0) 33%), linear-gradient(45deg, hsl(var(--hue2) 50% 10% / .8), hsl(var(--hue2) 50% 10% / 0) 33%), linear-gradient(hsl(220 25% 4.8% / .78)); backdrop-filter: blur(12px); box-shadow: var(--shadow-card); }
[data-theme="dark"] .glass .shine { pointer-events: none; border-radius: 0; border-top-right-radius: inherit; border-bottom-left-radius: inherit; border: 1px solid transparent; width: 75%; aspect-ratio: 1; display: block; position: absolute; right: calc(var(--border) * -1); top: calc(var(--border) * -1); z-index: 1; background: conic-gradient(from var(--conic, -45deg) at center in oklch, transparent 12%, hsl(var(--hue), 80%, 60%), transparent 50%) border-box; mask: linear-gradient(transparent), linear-gradient(black); mask-clip: padding-box, border-box; mask-composite: subtract; }
[data-theme="dark"] .glass .shine.shine-bottom { right: auto; top: auto; left: calc(var(--border) * -1); bottom: calc(var(--border) * -1); }
[data-theme="dark"] .glass .glow { pointer-events: none; border-top-right-radius: calc(var(--radius) * 2.5); border-bottom-left-radius: calc(var(--radius) * 2.5); border: calc(var(--radius) * 1.25) solid transparent; inset: calc(var(--radius) * -2); width: 75%; aspect-ratio: 1; display: block; position: absolute; left: auto; bottom: auto; background: conic-gradient(from var(--conic, -45deg) at center in oklch, hsl(var(--hue), 80%, 60% / .5) 12%, transparent 50%); filter: blur(12px) saturate(1.25); mix-blend-mode: plus-lighter; z-index: 3; opacity: 0.6; }
[data-theme="dark"] .glass .glow.glow-bottom { inset: auto; left: calc(var(--radius) * -2); bottom: calc(var(--radius) * -2); }
[data-theme="dark"] .glass.q-magic .shine, [data-theme="dark"] .glass.q-magic .glow { --hue: 280; }
[data-theme="dark"] .glass.q-magic .shine-bottom, [data-theme="dark"] .glass.q-magic .glow-bottom { --hue: 310; }

/* ═══ BULK GENERATION CARD (q-magic) ═══ */
.bulk-card { padding: 14px; margin-bottom: 14px; animation: fadeInUp 0.6s var(--ease-spring) both; }

.bulk-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; position: relative; z-index: 5; }
.bulk-head-ic { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; background: linear-gradient(135deg, hsl(280 70% 55%), hsl(305 65% 55%)); box-shadow: 0 4px 12px hsl(280 70% 50% / 0.5); position: relative; overflow: hidden; }
.bulk-head-ic::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.4) 85%, transparent 100%); animation: conicSpin 3s linear infinite; }
.bulk-head-ic svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; position: relative; z-index: 1; }
.bulk-head-text { flex: 1; min-width: 0; }
.bulk-head-title { font-size: 13px; font-weight: 800; letter-spacing: -0.01em; }
.bulk-head-sub { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-top: 1px; }

.bulk-info { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); margin-bottom: 12px; position: relative; z-index: 5; border: 1px solid var(--border-color); }
[data-theme="light"] .bulk-info, :root:not([data-theme]) .bulk-info { background: var(--surface); box-shadow: var(--shadow-pressed); border: none; }
[data-theme="dark"] .bulk-info { background: hsl(220 25% 4%); border: 1px dashed hsl(38 60% 35% / 0.5); }
.bulk-info-ic { width: 18px; height: 18px; flex-shrink: 0; display: grid; place-items: center; }
.bulk-info-ic svg { width: 14px; height: 14px; stroke: hsl(38 80% 50%); fill: none; stroke-width: 2.5; }
[data-theme="dark"] .bulk-info-ic svg { stroke: hsl(38 90% 60%); }
.bulk-info-text { font-size: 10.5px; font-weight: 600; color: var(--text-muted); line-height: 1.4; }
.bulk-info-text b { color: var(--text); font-weight: 800; }

.bulk-btn { width: 100%; height: 56px; padding: 0 16px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 800; color: white; border: none; position: relative; overflow: hidden; background: linear-gradient(135deg, hsl(280 70% 55%), hsl(305 65% 55%)); box-shadow: 0 6px 20px hsl(280 70% 50% / 0.5); }
.bulk-btn::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.4) 85%, transparent 100%); animation: conicSpin 3s linear infinite; }
.bulk-btn > * { position: relative; z-index: 1; }
.bulk-btn svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2.5; }
.bulk-btn .price-tag { font-family: var(--font-mono); font-size: 12px; font-weight: 800; padding: 3px 8px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.2); margin-left: 4px; }
.bulk-btn:active { transform: scale(0.98); }

/* ═══ DIVIDER ═══ */
.section-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0 12px; position: relative; z-index: 5; }
.section-divider .line { flex: 1; height: 1px; background: var(--border-color); }
[data-theme="light"] .section-divider .line, :root:not([data-theme]) .section-divider .line { background: rgba(163,177,198,0.4); }
[data-theme="dark"] .section-divider .line { background: hsl(var(--hue2) 12% 16%); }
.section-divider-label { font-family: var(--font-mono); font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }

/* ═══ INDIVIDUAL LIST CARD ═══ */
.individual-card { padding: 12px; animation: fadeInUp 0.6s var(--ease-spring) both; }
.individual-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; position: relative; z-index: 5; }
.individual-head-title { font-size: 13px; font-weight: 800; flex: 1; }
.individual-head-sub { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; color: var(--text-muted); }

.prod-list { display: flex; flex-direction: column; gap: 6px; position: relative; z-index: 5; }

.prod-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px 8px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); transition: box-shadow var(--dur) var(--ease), transform var(--dur-fast) var(--ease); }
[data-theme="light"] .prod-row, :root:not([data-theme]) .prod-row { background: var(--surface); box-shadow: var(--shadow-card-sm); border: none; }
[data-theme="light"] .prod-row:active, :root:not([data-theme]) .prod-row:active { box-shadow: var(--shadow-pressed); }
[data-theme="dark"] .prod-row { background: hsl(220 25% 6% / 0.6); }
.prod-row:active { transform: scale(0.99); }

.prod-thumb { width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0; display: grid; place-items: center; background: linear-gradient(135deg, hsl(330 50% 30%), hsl(330 50% 18%)); box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2); }
[data-theme="light"] .prod-thumb, :root:not([data-theme]) .prod-thumb { background: linear-gradient(135deg, oklch(0.85 0.06 330), oklch(0.78 0.08 330)); box-shadow: var(--shadow-pressed); }
.prod-thumb svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.8); fill: none; stroke-width: 1.5; }
[data-theme="light"] .prod-thumb svg, :root:not([data-theme]) .prod-thumb svg { stroke: oklch(0.45 0.18 330); }

.prod-info { flex: 1; min-width: 0; }
.prod-name { font-size: 12px; font-weight: 700; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-meta { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }

.prod-status { font-family: var(--font-mono); font-size: 8.5px; font-weight: 800; padding: 3px 8px; border-radius: var(--radius-pill); letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; border: 1px solid var(--border-color); display: inline-flex; align-items: center; gap: 4px; }
.prod-status svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; }
.prod-status.waiting { color: hsl(38 70% 45%); }
[data-theme="light"] .prod-status.waiting, :root:not([data-theme]) .prod-status.waiting { background: oklch(0.94 0.06 70); box-shadow: var(--shadow-pressed); border: none; }
[data-theme="dark"] .prod-status.waiting { background: hsl(38 50% 10% / 0.6); border: 1px solid hsl(38 70% 40% / 0.4); color: hsl(38 90% 65%); }

.prod-status.done { color: hsl(145 60% 35%); }
[data-theme="light"] .prod-status.done, :root:not([data-theme]) .prod-status.done { background: oklch(0.94 0.08 145); box-shadow: var(--shadow-pressed); border: none; }
[data-theme="dark"] .prod-status.done { background: hsl(145 50% 10% / 0.6); border: 1px solid hsl(145 70% 40% / 0.4); color: hsl(145 70% 65%); }

.prod-arrow { width: 22px; height: 22px; flex-shrink: 0; display: grid; place-items: center; }
.prod-arrow svg { width: 14px; height: 14px; stroke: var(--text-faint); fill: none; stroke-width: 2.5; }

/* ═══ STICKY FOOTER ═══ */
.qov-footer { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0)); border-top: 1px solid var(--border-color); display: flex; gap: 8px; }
[data-theme="light"] .qov-footer, :root:not([data-theme]) .qov-footer { background: var(--bg-main); box-shadow: 0 -4px 16px rgba(163,177,198,0.25); }
[data-theme="dark"] .qov-footer { background: hsl(220 25% 4.8% / 0.96); backdrop-filter: blur(16px); box-shadow: 0 -8px 24px hsl(var(--hue2) 50% 4%); }
.fbtn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 50px; padding: 0 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 800; letter-spacing: 0.02em; color: var(--text); border: 1px solid var(--border-color); flex: 1; transition: box-shadow var(--dur) var(--ease); }
[data-theme="light"] .fbtn, :root:not([data-theme]) .fbtn { background: var(--surface); box-shadow: var(--shadow-card-sm); border: none; }
[data-theme="light"] .fbtn:active, :root:not([data-theme]) .fbtn:active { box-shadow: var(--shadow-pressed); }
[data-theme="dark"] .fbtn { background: hsl(220 25% 8%); }
.fbtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

@keyframes orbSpin { to { transform: rotate(360deg); } }
@keyframes conicSpin { to { transform: rotate(360deg); } }
@keyframes auroraDrift { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-25px) scale(1.1); } 66% { transform: translate(-25px,35px) scale(0.95); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<div class="aurora" aria-hidden="true">
  <div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div>
</div>

<header class="qov-header">
  <button class="qov-icon-btn" aria-label="{T_BACK}">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="qov-cat-icon"><svg viewBox="0 0 24 24"><path d="M3 8c0 4 4 6 9 6s9-2 9-6c0-2-2-3-4-3s-3 1-5 1-3-1-5-1-4 1-4 3z"/><path d="M3 8v6c0 3 4 6 9 6s9-3 9-6V8"/></svg></div>
  <div class="qov-title-wrap">
    <div class="qov-title">{T_AI_CAT_LINGERIE}</div>
    <div class="qov-subtitle">8 {T_AI_PRODUCTS_WAITING}</div>

<script>
function syncThemeIcons() {
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  document.getElementById('themeIconSun').style.display  = (t === 'dark') ? 'block' : 'none';
  document.getElementById('themeIconMoon').style.display = (t === 'dark') ? 'none'  : 'block';
}
window.rmsToggleTheme = function () {
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var nxt = (cur === 'light') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', nxt);
  try { localStorage.setItem('rms_theme', nxt); } catch (_) {}
  syncThemeIcons();
};
syncThemeIcons();
</script>
