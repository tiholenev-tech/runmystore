<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RunMyStore</title>
    <style>
        html, body { margin: 0; padding: 0; background: #030712; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .logo { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, hsl(240 70% 65%), hsl(280 70% 60%)); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 16px; }
        .status { color: #8b92b0; font-size: 14px; }
    </style>
</head>
<body>
    <div>
        <div class="logo">RunMyStore</div>
        <div class="status" id="status">Стартиране...</div>
    </div>
    <script>
        // Capacitor environment detected → redirect to main app
        document.addEventListener('DOMContentLoaded', function() {
            var status = document.getElementById('status');
            if (window.Capacitor) {
                status.textContent = 'Свързване...';
                // Set Capacitor flag for PHP app
                window.location.href = 'https://runmystore.ai/?capacitor=1';
            } else {
                status.textContent = 'Моля, отворете от RunMyStore app';
            }
        });
    </script>
</body>
</html>
