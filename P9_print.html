[data-theme="dark"] .qty-input { background: hsl(220 25% 4%); border-top: 1px solid hsl(var(--hue2) 12% 20%); border-bottom: 1px solid hsl(var(--hue2) 12% 20%); }
.qty-input::-webkit-outer-spin-button,
.qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* per-row print btn */
.combo-print-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: grid; place-items: center;
  flex-shrink: 0;
  background: linear-gradient(135deg, hsl(var(--hue1) 80% 55%), hsl(var(--hue2) 80% 55%));
  box-shadow: 0 2px 8px hsl(var(--hue1) 80% 50% / 0.4);
}
.combo-print-btn svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }

/* ═══ PRIMARY PRINT-ALL BUTTON ═══ */
.print-all-btn {
  width: 100%;
  height: 56px; padding: 0 16px;
  border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 800;
  color: white; border: none;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, hsl(145 70% 50%), hsl(155 70% 40%));
  box-shadow: 0 6px 20px hsl(145 70% 45% / 0.5);
  margin-bottom: 10px;
}
.print-all-btn::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.4) 85%, transparent 100%); animation: conicSpin 3s linear infinite; }
.print-all-btn > * { position: relative; z-index: 1; }
.print-all-btn svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2.5; }
.print-all-btn .count { font-family: var(--font-mono); font-size: 12px; font-weight: 800; padding: 3px 8px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.2); }

/* ═══ CSV BUTTON ═══ */
.csv-btn {
  width: 100%;
  height: 44px; padding: 0 14px;
  border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 12px; font-weight: 700;
  color: var(--accent); border: 1px solid var(--border-color);
  margin-bottom: 12px;
}
[data-theme="light"] .csv-btn, :root:not([data-theme]) .csv-btn { background: var(--surface); box-shadow: var(--shadow-card-sm); border: none; }
[data-theme="light"] .csv-btn:active, :root:not([data-theme]) .csv-btn:active { box-shadow: var(--shadow-pressed); }
[data-theme="dark"] .csv-btn { background: hsl(220 25% 8%); color: hsl(var(--hue1) 80% 70%); }
.csv-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ═══ FOOTER ACTIONS ═══ */
.footer-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.fbtn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 46px; padding: 0 14px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 700;
  color: var(--text); border: 1px solid var(--border-color);
  flex: 1;
}
[data-theme="light"] .fbtn, :root:not([data-theme]) .fbtn { background: var(--surface); box-shadow: var(--shadow-card-sm); border: none; }
[data-theme="light"] .fbtn:active, :root:not([data-theme]) .fbtn:active { box-shadow: var(--shadow-pressed); }
[data-theme="dark"] .fbtn { background: hsl(220 25% 8%); }
.fbtn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
.fbtn.add { color: var(--accent); }
[data-theme="dark"] .fbtn.add { color: hsl(var(--hue1) 80% 70%); }

/* "Към инвентаризацията" — green gradient */
.inv-btn {
  width: 100%;
  height: 50px; padding: 0 16px;
  border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; font-weight: 800;
  color: white; border: none;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, hsl(145 70% 50%), hsl(155 70% 40%));
  box-shadow: 0 4px 14px hsl(145 70% 45% / 0.4);
}
.inv-btn::before { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.35) 85%, transparent 100%); animation: conicSpin 4s linear infinite; }
.inv-btn > * { position: relative; z-index: 1; }
.inv-btn svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }

/* anims */
@keyframes orbSpin { to { transform: rotate(360deg); } }
@keyframes conicSpin { to { transform: rotate(360deg); } }
@keyframes auroraDrift { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-25px) scale(1.1); } 66% { transform: translate(-25px,35px) scale(0.95); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes successPop { 0% { opacity: 0; transform: scale(0.5); } 60% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
</style>
</head>
<body>

<div class="aurora" aria-hidden="true">
  <div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div>
</div>

<header class="wiz-header">
  <button class="wiz-icon-btn" aria-label="{T_BACK}">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="wiz-title-wrap">
    <div class="wiz-title">{T_PRINT_LABELS}</div>
    <div class="wiz-subtitle">{T_STEP_6_OF_6}</div>
  </div>
  <span class="wiz-pro-pill">PRO</span>
  <button class="wiz-icon-btn" id="themeToggle" onclick="rmsToggleTheme()" aria-label="{T_THEME}">
    <svg id="themeIconSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="themeIconMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
  <button class="wiz-icon-btn" aria-label="{T_CLOSE}">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</header>

<!-- Step indicator: всички 5 done + 1 active -->
<div class="wiz-steps">
  <div class="wiz-step-dot done"></div><div class="wiz-step-bar done"></div>
  <div class="wiz-step-dot done"></div><div class="wiz-step-bar done"></div>
  <div class="wiz-step-dot done"></div><div class="wiz-step-bar done"></div>
  <div class="wiz-step-dot done"></div><div class="wiz-step-bar done"></div>
  <div class="wiz-step-dot done"></div><div class="wiz-step-bar done"></div>
  <div class="wiz-step-dot active"></div>
</div>
<div class="wiz-step-label">{T_STEP_6_OF_6} · {T_PRINT}</div>

<main class="app">

  <!-- ═══ SUCCESS HERO (q-gain) ═══ -->
  <div class="glass sm success-card q-gain">
    <span class="shine"></span><span class="shine shine-bottom"></span>
    <span class="glow"></span><span class="glow glow-bottom"></span>
    <div class="success-ic">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">{T_PRODUCT_SAVED}</div>
    <div class="success-meta"><b>Дамски бански Passionata</b> · 34,90 € · 68,28 лв</div>
  </div>

  <!-- ═══ PRINT MODE TABS ═══ -->
  <div class="tabs-row">
    <button class="tab-btn" data-tab="dual" onclick="setPrintMode('dual')">€ + лв</button>
    <button class="tab-btn" data-tab="eur" onclick="setPrintMode('eur')">{T_PRICE_EUR_ONLY}</button>
    <button class="tab-btn" data-tab="noprice" onclick="setPrintMode('noprice')">{T_NO_PRICE}</button>
  </div>

  <!-- ═══ TOGGLE: Печат без баркод ═══ -->
  <button class="toggle-row" id="noBarcodeToggle" onclick="toggleNoBarcode()">
    <span class="toggle-cb"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
    <span class="toggle-text">{T_PRINT_NO_BARCODE}</span>
  </button>

  <!-- ═══ DUAL PRICING WARNING ═══ -->
  <div class="warn-banner">
    <span class="warn-ic">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </span>
    <span class="warn-text">{T_DUAL_PRICING_WARN}</span>
  </div>

  <!-- ═══ COMBOS LIST ═══ -->
  <div class="glass sm combos-card">
    <span class="shine"></span><span class="shine shine-bottom"></span>
    <span class="glow"></span><span class="glow glow-bottom"></span>

    <div class="combos-head">
      <span class="combos-title">{T_VARIATIONS_FOR_PRINT}</span>
      <button class="x-btn" onclick="labelsX2()">×2</button>
      <button class="x-btn amber" onclick="labelsReset()">1:1</button>
    </div>

    <div class="combo-list">
      <!-- S — Черен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">S</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#1a1a1a"></span>Черен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(0,-1)">−</button>
          <input type="number" class="qty-input" id="q0" value="3" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(0,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>

      <!-- S — Червен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">S</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#dc2626"></span>Червен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(1,-1)">−</button>
          <input type="number" class="qty-input" id="q1" value="2" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(1,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>

      <!-- M — Черен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">M</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#1a1a1a"></span>Черен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(2,-1)">−</button>
          <input type="number" class="qty-input" id="q2" value="4" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(2,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>

      <!-- M — Червен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">M</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#dc2626"></span>Червен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(3,-1)">−</button>
          <input type="number" class="qty-input" id="q3" value="3" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(3,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>

      <!-- L — Черен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">L</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#1a1a1a"></span>Черен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(4,-1)">−</button>
          <input type="number" class="qty-input" id="q4" value="2" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(4,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>

      <!-- L — Червен -->
      <div class="combo-row">
        <div class="combo-info">
          <span class="combo-size">L</span>
          <span class="combo-color-chip"><span class="combo-color-dot" style="background:#dc2626"></span>Червен</span>
        </div>
        <div class="qty-step">
          <button class="qty-btn" onclick="qtyAdj(5,-1)">−</button>
          <input type="number" class="qty-input" id="q5" value="1" min="0" onchange="qtyRecalc()">
          <button class="qty-btn" onclick="qtyAdj(5,1)">+</button>
        </div>
        <button class="combo-print-btn" aria-label="{T_PRINT_ROW}">
          <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ PRINT ALL BUTTON ═══ -->
  <button class="print-all-btn">
    <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    <span>{T_PRINT_ALL}</span>
    <span class="count" id="totalCount">15 ет.</span>
  </button>

  <!-- ═══ CSV EXPORT BUTTON ═══ -->
  <button class="csv-btn">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>{T_DOWNLOAD_CSV_ONLINE_STORE}</span>
  </button>

  <!-- ═══ FOOTER ACTIONS ═══ -->
  <div class="footer-actions">
    <button class="fbtn add">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>{T_ADD_NEW}</span>
    </button>
    <button class="fbtn">
      <span>{T_CLOSE}</span>
    </button>
  </div>

  <!-- ═══ "Към инвентаризацията" (conditional, ако е дошъл от inventory) ═══ -->
  <button class="inv-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    <span>{T_BACK_TO_INVENTORY}</span>
  </button>

</main>

<script>
function syncThemeIcons() {
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  document.getElementById('themeIconSun').style.display  = (t === 'dark') ? 'block' : 'none';
  document.getElementById('themeIconMoon').style.display = (t === 'dark') ? 'none'  : 'block';
}
window.rmsToggleTheme = function () {
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var nxt = (cur === 'light') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', nxt);
  try { localStorage.setItem('rms_theme', nxt); } catch (_) {}
  syncThemeIcons();
};
syncThemeIcons();

function setPrintMode(m) { document.documentElement.setAttribute('data-print-mode', m); }

function toggleNoBarcode() { document.getElementById('noBarcodeToggle').classList.toggle('on'); }

function qtyAdj(idx, delta) {
  var inp = document.getElementById('q' + idx);
  var v = parseInt(inp.value) || 0;
  v = Math.max(0, v + delta);
  inp.value = v;
  qtyRecalc();
}
function qtyRecalc() {
  var total = 0;
  for (var i = 0; i < 6; i++) {
    var inp = document.getElementById('q' + i);
    if (inp) total += parseInt(inp.value) || 0;
  }
  document.getElementById('totalCount').textContent = total + ' ет.';
}
function labelsX2() {
  for (var i = 0; i < 6; i++) {
    var inp = document.getElementById('q' + i);
    if (inp) inp.value = (parseInt(inp.value) || 0) * 2;
  }
  qtyRecalc();
}
function labelsReset() {
  // 1:1 = ресет към default (един етикет на бройка)
  var defaults = [3, 2, 4, 3, 2, 1];
  for (var i = 0; i < 6; i++) {
    var inp = document.getElementById('q' + i);
    if (inp) inp.value = defaults[i];
  }
  qtyRecalc();
}
</script>
</body>
</html>
